---
# Changelog for graphiant.naas collection
# Format: https://docs.ansible.com/projects/antsibull-changelog/changelog.yaml-format/
# Entry text must be valid reStructuredText (RST), not Markdown. Use ``name`` (backticks) for literals (modules, files, commands).

ancestor: null
releases:
  "26.3.0":
    release_date: "2026-03-30"
    changes:
      minor_changes:
        - "Portal authentication: optional ``access_token`` module option and ``GRAPHIANT_ACCESS_TOKEN`` environment variable (e.g. after ``graphiant login``); invalid or missing token falls back to username/password when provided"
        - "Minimum ``graphiant-sdk`` raised to ``>= 26.3.0`` (see ``_version.py`` ``DEPENDENCIES``)"
  "26.2.4":
    release_date: "2026-03-12"
    changes:
      minor_changes:
        - "Collection version bumped to 26.2.4"
        - "Documentation: use absolute GitHub URLs for doc links in ``README.md`` and ``docs/`` so links work on both GitHub and Ansible Galaxy (fixes page-not-found on Galaxy)"
        - "``scripts/bump_version.py``: update ``changelogs/changelog.yaml`` with text-only insertion and ``galaxy.yml`` with version-line-only replace to avoid reformatting diffs; stop auto-updating ``version_added`` in modules"
        - "All modules: set ``version_added`` to corresponding major.minor.0 format (e.g. 26.2.0) to satisfy Ansible ``validate-modules`` requirement (major or minor only, not patch)"
        - "``scripts/check_inclusion_checklist.py``: validate ``changelogs/changelog.yaml`` uses RST format (no Ansible markup; use double backticks for literals per Sphinx RST and Ansible inclusion requirements)"
  "26.2.3":
    release_date: "2026-03-12"
    changes:
      minor_changes:
        - "Collection version bumped to 26.2.3"
        - "TE-4347: NTP support - new ``graphiant_ntp`` module and ``ntp_management.yml`` playbook (#47)"
        - "TE-4347: NTP configuration in ``graphiant_global_config`` and sample NTP configs"
        - "antsibull-changelog: config and changelog format aligned with Ansible community; RST instead of Markdown in changelog entries (#52)"
        - "CI: add ``antsibull-changelog lint-changelog-yaml`` to lint workflow (#52)"
        - "TE-4350 TE-4450: Graphiant filters global objects - ``graphiant_global_config`` supports graphiant_filters; new ``sample_global_graphiant_filters.yaml`` and routing policy template (#51)"
        - "TE-4350 TE-4450: ``graphiant_data_exchange`` module and Data Exchange playbooks/samples updated; collection review comments addressed (#51)"
        - "Common module arguments (Graphiant portal auth) moved to ``module_utils/graphiant_utils.py`` and ``doc_fragments/graphiant_portal_auth.py``; modules use ``extends_documentation_fragment`` for shared docs (#55)"
      removed_features:
        - "Removed ``tests/sanity/requirements.txt`` - ansible-test does not use this file (#52)"
  "26.2.2":
    release_date: "2026-02-20"
    changes:
      minor_changes:
        - "Collection version bumped to 26.2.2"
        - "Updated to Graphiant SDK 26.2.1 for latest API support (use ``graphiant-sdk>=26.2.1``)"
  "26.2.1":
    release_date: "2026-02-12"
    changes:
      minor_changes:
        - "TE-4399: Static Routes support - new ``graphiant_static_routes`` module and ``static_routes_management.yml`` playbook (#44)"
        - "TE-4333: Site-to-Site VPN support - ``graphiant_site_to_site_vpn`` module and playbook (#32)"
        - "Collection version bumped to 26.2.1"
        - "TE-4409: check_mode now shows config that would be applied and reports correct ``changed`` status (#43)"
        - "TE-4410: Ability to swap interface LAN segment in a single task (#43)"
        - "Commits since v26.1.1: #32 (site-to-site VPN), #42 (global_config idempotency), #43 (check_mode / LAN segment swap), #44 (static routes)"
      bugfixes:
        - "TE-4401: Fix idempotent issues in ``graphiant_global_config`` deconfigure workflows (#42)"
        - "TE-4401: BGP filter template and vault management fixes (#42)"
      security_fixes:
        - "Updated security documentation to reflect 26.2.x as current stable release"
  "26.1.1":
    release_date: "2026-02-04"
    changes:
      minor_changes:
        - "Updated to Graphiant SDK 26.1.1 for latest API support (use ``graphiant-sdk>=26.1.1``)"
        - "Enhanced compatibility with Graphiant API v26.1.1"
        - "TE-4349: LAG (Link Aggregation) configuration support - new ``graphiant_lag_interfaces`` module and playbook support"
        - "TE-4354: BFD (Bidirectional Forwarding Detection) support in BGP peering - configurable BFD parameters"
        - "TE-4331: VRRP (Virtual Router Redundancy Protocol) configuration on interfaces - ``graphiant_vrrp`` module and tests"
        - "TE-4293: New API ``get_matching_customers_for_service`` for retrieving match_id from service_id"
        - "TE-4293: New playbook ``08_dataex_query_service_health.yml`` for service health monitoring"
        - "Updated Graphiant SDK dependency to >= 26.1.1 across all modules and documentation"
        - "Collection version bumped to 26.1.1; module version_added to 26.1.0 format where applicable"
        - "TE-4366: Fix idempotency in interface modules operations (part 1) and add tests (#33)"
        - "TE-4357: Enforcing Ansible inclusion checklist compliance (#29)"
        - "Config and documentation: camelCase alignment and config changes"
        - "Removed dependency version pinning in favor of minimum version (``graphiant-sdk>=26.1.1``)"
        - "TE-4293: Updated Data Exchange playbooks to use ``graphiant_data_exchange_info`` for query operations"
        - "TE-4293: Enhanced ``matches_file`` behavior - match_id lookup via API when only service_id is provided"
        - "TE-4293: Self-healing matches_file recovery - re-running match workflow recovers match_ids for existing matches"
        - "VRRP configure/deconfigure test coverage added in test suite"
        - "TE-4293: Consumer tenant can lookup match_id via API using service_id; matches_file optional for accept_invitation when service visible to consumer"
      bugfixes:
        - "TE-4366: Idempotent behavior fixes in interface module operations"
        - "Fixes for corner cases in module and playbook behavior"
        - "PEP8: remove trailing whitespace and add newline at EOF where missing"
        - "TE-4293: Fixed playbooks using incorrect module for query operations (now uses ``graphiant_data_exchange_info``)"
      security_fixes:
        - "Updated security documentation to reflect 26.1.x as current stable release"
        - "Workflow permissions: add permissions to GitHub Actions workflows for code scanning (alerts #38, #39, #40)"
  "25.12.3":
    release_date: "2026-01-09"
    changes:
      minor_changes:
        - "New module ``graphiant_data_exchange_info`` for querying Data Exchange information (services summary, customers summary, service health)"
        - "Support for Python 3.7+ (previously required Python 3.9+)"
        - "Removed query operations from ``graphiant_data_exchange`` module - use ``graphiant_data_exchange_info`` instead"
        - "Updated all module documentation to use semantic markup (V(), O(), I(), RV(), M()) per Ansible documentation standards"
        - "Updated all builtin module references to use FQCNs (e.g., ``ansible.builtin.debug`` instead of ``debug``)"
        - "Removed ``requires_ansible`` from ``meta/runtime.yml`` - collection supports ansible-core >= 2.17.0"
        - "Consolidated dependency management - removed ``requirements-dev.txt`` and ``generate_requirements.py``, now using ``requirements-ee.txt`` for all environments"
        - "Updated license from MIT to GPLv3+ for consistency across all files"
        - "Converted ``CHANGELOG.md`` to ``changelogs/changelog.yaml`` format for automated changelog generation"
        - "Updated CI/CD workflows to test against ansible-core 2.17, 2.18, 2.19, and 2.20 with scheduled runs"
        - "Query operations for Data Exchange should now use ``graphiant.naas.graphiant_data_exchange_info`` module"
        - "Collection now supports Python 3.7+ (compatible with ansible-core 2.17, 2.18, 2.19, and 2.20)"
        - "All CI/CD workflows use ``requirements-ee.txt`` for consistency"
        - "Execution Environments should use ``meta/execution-environment.yml`` which points to ``requirements-ee.txt``"
      bugfixes:
        - "TE-4321: Fix ``graphiant_bgp`` template to support BGP peers with multiple different local interfaces in same segment (#18)"
        - "Fixed module documentation to include ``check_mode`` support information in ``attributes`` field"
        - "Fixed all module examples to use FQCNs for builtin modules"
      removed_features:
        - "Removed ``state: query`` option from ``graphiant_data_exchange`` module"
        - "Removed query operations (``get_services_summary``, ``get_customers_summary``, ``get_service_health``) from ``graphiant_data_exchange`` module"
        - "Removed ``requirements-dev.txt`` file - use ``requirements-ee.txt`` instead"
        - "Removed ``scripts/generate_requirements.py`` - requirements are now manually maintained"
  "25.12.2":
    release_date: "2025-12-22"
    changes:
      minor_changes:
        - "Idempotency tracking for all modules - ``changed: false`` is now correctly reported when no modifications occur"
        - "Graceful error handling for \"object not found\" errors in deconfigure operations"
        - "Manager methods now return structured result dictionaries with ``changed``, ``created``, ``skipped``, and ``deleted`` fields"
        - "Modules correctly interpret and propagate ``changed`` status from manager results"
        - "Improved idempotency behavior across all modules"
        - "PUT/PATCH operations (``configure_interfaces``, ``configure_bgp``, etc.) always report ``changed: true`` as state comparison is not implemented"
      bugfixes:
        - "Fixed idempotency reporting - modules now correctly report ``changed: false`` when no actual changes are made"
        - "Fixed error handling for deconfigure operations when objects don't exist"
  "25.12.1":
    release_date: "2025-12-18"
    changes:
      minor_changes:
        - "TE-4262: Renamed collection to ``graphiant.naas`` (from graphiant.graphiant_playbooks)"
        - "TE-4261: New ``graphiant_device_config`` module - push raw device configurations (Edge, Gateway, Core)"
        - "Updated to Graphiant SDK 25.12.1 for latest API support"
        - "Enhanced compatibility with Graphiant API v25.12.1"
        - "Updated Graphiant SDK dependency to 25.12.1"
        - "Collection version bumped to 25.12.1"
        - "Updated module ``version_added`` to 25.12.0 format"
      security_fixes:
        - "Updated security documentation to reflect 25.12.x as current stable release"
  "25.11.3":
    release_date: "2025-12-13"
    changes:
      minor_changes:
        - "Comprehensive ``SECURITY.md`` with security best practices, vulnerability reporting process, and security checklist"
        - "Security policy covering credential management, code security, dependency management, and CI/CD security"
        - "Reorganized documentation structure following Ansible collection best practices"
        - "Moved ``CONTRIBUTING.md`` to repository root for better visibility"
        - "Consolidated version management documentation into ``docs/guides/VERSION_MANAGEMENT.md``"
        - "Enhanced ``CONTRIBUTING.md`` with detailed branch protection requirements and GPG signing instructions"
        - "Added ``.github/CODEOWNERS`` file for automatic code review assignments"
        - "Improved code ownership structure with SRE team approval requirements"
        - "Removed ``test.ini`` file in favor of environment variable-based credential management"
        - "Updated ``tests/test.py`` to require environment variables (``GRAPHIANT_HOST``, ``GRAPHIANT_USERNAME``, ``GRAPHIANT_PASSWORD``)"
        - "Enhanced credential examples in playbooks to reflect best practices"
        - "Updated all documentation references to reflect new file locations"
        - "Improved documentation organization with guides in ``docs/guides/`` directory"
        - "Enhanced release process documentation with version management details"
      removed_features:
        - "Removed ``ansible_collections/graphiant/naas/tests/test.ini`` - Replaced with environment variable-based configuration"
        - "Removed ``setup.cfg`` - No longer required for collection configuration"
      bugfixes:
        - "Improved GPG signing documentation and troubleshooting guidance"
        - "Enhanced branch protection rule compliance documentation"
        - "Better credential management practices and examples"
      security_fixes:
        - "Added comprehensive security best practices documentation"
        - "Improved credential handling with environment variable requirements"
        - "Enhanced security checklist for contributors"
