- name: networks_appliance_static_routes tests
  hosts: localhost
  gather_facts: false
  vars:
    network_id: "L_828099381482779330"
    # route_subnet must be a REMOTE subnet (not assigned to any local VLAN on this MX)
    # route_gateway must be a next-hop IP reachable via a local VLAN (e.g. a LAN interface IP)
    route_subnet: "10.254.254.0/24"
    route_gateway: "192.168.128.1"
  tasks:

    # -------------------------------------------------------------------------
    # CREATE
    # -------------------------------------------------------------------------
    - name: Create static route
      cisco.meraki.networks_appliance_static_routes:
        meraki_suppress_logging: false
        state: present
        networkId: "{{ network_id }}"
        name: "Test static route"
        subnet: "{{ route_subnet }}"
        gatewayIp: "{{ route_gateway }}"
      register: route_created


    
