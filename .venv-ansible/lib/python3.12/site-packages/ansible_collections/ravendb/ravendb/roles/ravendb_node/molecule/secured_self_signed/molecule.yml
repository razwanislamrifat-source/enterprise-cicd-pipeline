dependency:
  name: galaxy
driver:
  name: docker

platforms:
  - name: a.ravendb-self-signed
    image: 'docker.io/geerlingguy/docker-ubuntu2204-ansible:latest'
    privileged: true
    command: /usr/sbin/init
    volumes:
      - '/sys/fs/cgroup:/sys/fs/cgroup:rw'
    tmpfs:
      - /run
      - /tmp
    cgroupns_mode: host

provisioner:
  name: ansible
  log: true
  inventory:
    host_vars:
      a.ravendb-self-signed:
        node_tag: "A"
scenario:
  name: secured_self_signed
  test_sequence:
    - destroy
    - create
    - converge
    - verify
verifier:
  name: ansible
