apiVersion: apps/v1
kind: Deployment
metadata:
  name: advanced-cicd-app
  namespace: advanced-cicd
  labels:
    app: advanced-cicd-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: advanced-cicd-app
  template:
    metadata:
      labels:
        app: advanced-cicd-app
    spec:
      containers:
        - name: advanced-cicd-app
          image: advanced-cicd-app:2.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
